name: nba_2k_lab
version: 1.0.0
config-version: 2

profile: nba_2k_lab

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Data lives in MDLS (Managed Data Lake Service) as Iceberg tables in S3,
# registered in a shared catalog (AWS Glue). Fivetran lands raw rows into
# `bronze_<source>` schemas. This dbt project builds silver (staging +
# intermediate) and gold (marts) ON TOP of those bronze Iceberg tables.
#
# Engine is independent: the same models run on either
#   - Snowflake-on-Iceberg (target: snowflake_iceberg)
#   - Athena/Trino on Glue (target: athena_iceberg)
#
# Schemas land at:
#   silver_stg  -> staging views
#   silver_int  -> intermediate tables
#   gold        -> marts (incremental Iceberg)
models:
  nba_2k_lab:
    +materialized: view
    staging:
      +materialized: view
      +schema: silver_stg
      +tags: ["staging", "silver"]
    intermediate:
      +materialized: table
      +schema: silver_int
      +tags: ["intermediate", "silver"]
    marts:
      +materialized: table
      +schema: gold
      +tags: ["marts", "gold"]

vars:
  # Used by int_player_recent_form to define the rolling window.
  recent_window_games: 5
  recent_window_days: 30
